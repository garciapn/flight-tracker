<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Flight Tracker - SAN to ATH</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 25%, #1e40af 50%, #0369a1 75%, #0c4a6e 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            min-height: 100vh;
            padding: 30px 20px;
            color: #1f2937;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            animation: slideInUp 0.6s ease;
        }

        header::before {
            content: '✈️';
            position: absolute;
            top: -30px;
            right: 40px;
            font-size: 250px;
            opacity: 0.08;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e40af 0%, #7c3aed 50%, #db2777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .route {
            font-size: 1.5rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .route-detail {
            font-size: 1rem;
            color: #6b7280;
            font-weight: 500;
        }

        .search-section {
            margin-top: 35px;
            padding-top: 35px;
            border-top: 2px solid rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-btn {
            background: linear-gradient(135deg, #1e40af, #7c3aed);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(30, 64, 175, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .search-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .search-btn:hover::before {
            left: 100%;
        }

        .search-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(30, 64, 175, 0.4);
        }

        .search-input {
            padding: 14px 24px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            width: 320px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: white;
            color: #1f2937;
        }

        .search-input::placeholder {
            color: #9ca3af;
        }

        .search-input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
            background: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            animation: slideInUp 0.6s ease;
            animation-fill-mode: both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #1e40af, #7c3aed, #db2777);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .stat-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            border-color: rgba(124, 58, 237, 0.3);
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e40af, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 12px;
        }

        .stat-change {
            font-size: 0.95rem;
            color: #6b7280;
            font-weight: 500;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
            animation: slideInUp 0.6s ease 0.2s both;
        }

        .chart-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: #1f2937;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .flights-list {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
            animation: slideInUp 0.6s ease 0.4s both;
        }

        .flight-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            padding: 28px;
            margin-bottom: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .flight-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, #1e40af, #7c3aed, #db2777);
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.4s ease;
        }

        .flight-card:hover {
            transform: translateX(8px) translateY(-5px);
            border-color: #7c3aed;
            box-shadow: 0 20px 50px rgba(124, 58, 237, 0.2);
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
        }

        .flight-card:hover::before {
            transform: scaleY(1);
        }

        .flight-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
            gap: 20px;
        }

        .flight-airline {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #1f2937;
            line-height: 1.2;
        }

        .flight-price {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e40af, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: right;
        }

        .flight-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            color: #4b5563;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #e5e7eb;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 6px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .detail-value {
            font-size: 1.1rem;
            color: #1f2937;
            font-weight: 600;
        }

        .flight-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .book-btn {
            flex: 1;
            min-width: 200px;
            background: linear-gradient(135deg, #1e40af, #7c3aed);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(30, 64, 175, 0.25);
            position: relative;
            overflow: hidden;
        }

        .book-btn::after {
            content: '→';
            position: absolute;
            right: 20px;
            transition: right 0.3s ease;
        }

        .book-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(30, 64, 175, 0.35);
        }

        .book-btn:hover::after {
            right: 15px;
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            animation: pulse 2s ease-in-out infinite;
        }

        .last-update {
            text-align: center;
            color: rgba(255, 255, 255, 0.95);
            margin-top: 40px;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            animation: slideInUp 0.6s ease 0.6s both;
        }

        .last-update small {
            display: block;
            opacity: 0.8;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }

            .route {
                font-size: 1.2rem;
            }

            .stat-value {
                font-size: 2rem;
            }

            .flight-price {
                font-size: 2.2rem;
            }

            .search-section {
                flex-direction: column;
            }

            .search-input {
                width: 100%;
            }

            .flight-header {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Greece Tracker</h1>
            <div class="route">San Diego → Athens</div>
            <div class="route-detail">June 12-22, 2026 • 2 Adults • Round Trip</div>

            <div class="search-section">
                <button class="search-btn" onclick="searchGoogleFlights()">
                    🔍 All Flights on Google
                </button>
                <input
                    type="text"
                    class="search-input"
                    id="flightSearch"
                    placeholder="Search airline, price, duration..."
                    onkeyup="filterFlights()"
                />
            </div>
        </header>

        <div class="stats-grid" id="statsGrid">
            <div class="loading">Loading flight data...</div>
        </div>

        <div class="chart-container">
            <h2 class="chart-title">📊 Price Trend</h2>
            <canvas id="priceChart"></canvas>
        </div>

        <div class="flights-list">
            <h2 class="chart-title">🎫 Best Flights Available</h2>
            <div id="flightsList">
                <div class="loading">Analyzing flights...</div>
            </div>
        </div>

        <div class="last-update" id="lastUpdate">Initializing...</div>
    </div>

    <script>
        let priceChart = null;
        let allFlights = [];

        async function loadData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();

                updateStats(data.latest);
                updateChart(data.history);
                allFlights = data.flights || [];
                updateFlights(allFlights);
                updateLastUpdate(data.latest.timestamp);
            } catch (err) {
                console.error('Failed to load data:', err);
            }
        }

        function updateStats(latest) {
            const statsGrid = document.getElementById('statsGrid');

            if (!latest || !latest.stats) {
                statsGrid.innerHTML = '<div class="loading">No data available yet</div>';
                return;
            }

            const stats = latest.stats;

            statsGrid.innerHTML = `
                <div class="stat-card">
                    <span class="stat-icon">💰</span>
                    <div class="stat-label">Best Price</div>
                    <div class="stat-value">$${stats.min}</div>
                    <div class="stat-change">$${Math.round(stats.min / 2)} per person</div>
                </div>

                <div class="stat-card">
                    <span class="stat-icon">📊</span>
                    <div class="stat-label">Average Price</div>
                    <div class="stat-value">$${Math.round(stats.avg)}</div>
                    <div class="stat-change">${stats.count} options</div>
                </div>

                <div class="stat-card">
                    <span class="stat-icon">🎯</span>
                    <div class="stat-label">Price Per Person</div>
                    <div class="stat-value">$${Math.round(stats.min / 2)}</div>
                    <div class="stat-change">Best deal</div>
                </div>

                <div class="stat-card">
                    <span class="stat-icon">📉</span>
                    <div class="stat-label">Price Range</div>
                    <div class="stat-value">$${stats.max - stats.min}</div>
                    <div class="stat-change">Spread</div>
                </div>
            `;
        }

        function updateChart(history) {
            const ctx = document.getElementById('priceChart');

            if (!history || history.length === 0) {
                return;
            }

            const labels = history.map(h => new Date(h.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
            const minPrices = history.map(h => h.stats?.min || null);
            const avgPrices = history.map(h => h.stats?.avg || null);

            if (priceChart) {
                priceChart.destroy();
            }

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Best Price',
                            data: minPrices,
                            borderColor: '#1e40af',
                            backgroundColor: 'rgba(30, 64, 175, 0.1)',
                            tension: 0.4,
                            fill: true,
                            borderWidth: 3,
                            pointRadius: 6,
                            pointBackgroundColor: '#1e40af',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointHoverRadius: 8
                        },
                        {
                            label: 'Average Price',
                            data: avgPrices,
                            borderColor: '#7c3aed',
                            backgroundColor: 'rgba(124, 58, 237, 0.1)',
                            tension: 0.4,
                            fill: false,
                            borderWidth: 3,
                            pointRadius: 6,
                            pointBackgroundColor: '#7c3aed',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointHoverRadius: 8
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                font: { size: 14, weight: 600, family: "'Space Grotesk', sans-serif" },
                                color: '#1f2937',
                                padding: 20,
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(31, 41, 55, 0.95)',
                            padding: 16,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            borderColor: 'rgba(124, 58, 237, 0.3)',
                            borderWidth: 1,
                            displayColors: true,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': $' + context.parsed.y;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: 'rgba(0, 0, 0, 0.05)', drawBorder: false },
                            ticks: {
                                callback: function(value) { return '$' + value; },
                                font: { size: 12, weight: 500 },
                                color: '#6b7280',
                                padding: 12
                            }
                        },
                        x: {
                            grid: { display: false, drawBorder: false },
                            ticks: {
                                font: { size: 12, weight: 500 },
                                color: '#6b7280',
                                padding: 12
                            }
                        }
                    }
                }
            });
        }

        function updateFlights(flights) {
            const flightsList = document.getElementById('flightsList');

            if (!flights || flights.length === 0) {
                flightsList.innerHTML = '<div class="loading">No flights available</div>';
                return;
            }

            flightsList.innerHTML = flights.map((flight, idx) => {
                const price = typeof flight.price === 'string'
                    ? parseInt(flight.price.replace('$', '').replace(',', ''))
                    : flight.price;

                return `
                    <div class="flight-card" data-airline="${flight.airline.toLowerCase()}" data-price="${price}">
                        <div class="flight-header">
                            <div>
                                <div class="flight-airline">${flight.airline}</div>
                                ${idx === 0 ? '<span class="badge">✨ Best Price</span>' : ''}
                            </div>
                            <div class="flight-price">$${price}</div>
                        </div>
                        <div class="flight-details">
                            <div class="detail-item">
                                <div class="detail-label">Departs</div>
                                <div class="detail-value">${flight.departure}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Arrives</div>
                                <div class="detail-value">${flight.arrival}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Duration</div>
                                <div class="detail-value">${flight.duration}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Stops</div>
                                <div class="detail-value">${flight.stops}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Layover</div>
                                <div class="detail-value">${flight.layover}</div>
                            </div>
                        </div>
                        <div class="flight-actions">
                            <button class="book-btn" onclick="bookThisFlight('${flight.airline}', '${flight.departure}', '${flight.arrival}', '${price}')">
                                Book This Flight
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function searchGoogleFlights() {
            const googleFlightsUrl = 'https://www.google.com/travel/flights?q=Flights from SAN to ATH on 2026-06-12 returning 2026-06-22 for 2 adults';
            window.open(googleFlightsUrl, '_blank');
        }

        function bookThisFlight(airline, departure, arrival, price) {
            // Open Google Flights search for this specific flight
            const googleFlightsUrl = `https://www.google.com/travel/flights?q=Flights from SAN to ATH on 2026-06-12 returning 2026-06-22 for 2 adults ${airline} ${departure} ${arrival}`;
            window.open(googleFlightsUrl, '_blank');
        }

        function filterFlights() {
            const searchTerm = document.getElementById('flightSearch').value.toLowerCase();
            const flightCards = document.querySelectorAll('.flight-card');

            flightCards.forEach(card => {
                const airline = card.getAttribute('data-airline');
                const price = card.getAttribute('data-price');
                const textContent = card.textContent.toLowerCase();

                const matches = airline.includes(searchTerm) ||
                               price.includes(searchTerm) ||
                               textContent.includes(searchTerm);

                card.style.display = matches ? 'block' : 'none';
            });
        }

        function updateLastUpdate(timestamp) {
            const lastUpdate = document.getElementById('lastUpdate');
            const date = new Date(timestamp);
            const timeAgo = getTimeAgo(date);
            lastUpdate.innerHTML = `
                🔄 Last updated: ${date.toLocaleString()}
                <small>${timeAgo}</small>
            `;
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        loadData();
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
